# Only apply the rate-limit key to POST requests. For any other method the key is
# empty, and nginx does not account requests with an empty key — so GET (used to
# load the timeline) is never limited.
map $request_method $timeline_post_key {
    POST    $binary_remote_addr;
    default "";
}

# Rate limit zone: 1 request per minute per client IP for POST /api/timeline_post.
limit_req_zone $timeline_post_key zone=timeline_post_limit:10m rate=1r/m;

server {
    listen 80;
    server_name huzaifa-pe-portfolio.duckdns.org;

    if ($host = huzaifa-pe-portfolio.duckdns.org) {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name huzaifa-pe-portfolio.duckdns.org;

    # Restrict POST /api/timeline_post to 1 request per minute per IP.
    location = /api/timeline_post {
        limit_req zone=timeline_post_limit;
        proxy_pass http://myportfolio:5000/api/timeline_post;
    }

    location / {
        proxy_pass http://myportfolio:5000/;
    }

    # Load the certificate files.
    ssl_certificate         /etc/letsencrypt/live/myportfolio/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/myportfolio/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/myportfolio/chain.pem;
}
